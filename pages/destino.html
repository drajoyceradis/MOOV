<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MOOV | Microformulário do Destino</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="ambient-grid"></div>
  <main class="form-page">
    <div class="form-shell">
      <header class="form-header">
        <a class="brand-mark" href="../index.html">MOOV</a>
        <p class="eyebrow">Aceite e recebimento</p>
        <h1>Microcheck da unidade de destino</h1>
        <p class="muted">O destino confirma chegada, aceite, pendência ou recebimento para fechar a linha do tempo.</p>
      </header>

      <section class="panel-card form-card">
        <p class="eyebrow">Transferência</p>
        <div class="transfer-summary">
          <div class="summary-line"><span>Código</span><strong>R260506-P01-SM08-H01-001</strong></div>
          <div class="summary-line"><span>Origem</span><strong>PA São Pedro</strong></div>
          <div class="summary-line"><span>Destino</span><strong>Hospital Evangélico</strong></div>
        </div>

        <form data-mock-form>
          <div class="form-grid">
            <div class="form-group">
              <label class="field-label" for="receiveStatus">Status no destino</label>
              <select class="form-select" id="receiveStatus" required>
                <option value="">Selecione</option>
                <option>Chegou ao destino</option>
                <option>Aguardando recebimento</option>
                <option>Recebido pela equipe</option>
                <option>Recebimento pendente</option>
              </select>
            </div>
            <div class="form-group">
              <label class="field-label" for="sector">Setor de recebimento</label>
              <input class="form-input" id="sector" placeholder="Ex.: Pronto-socorro / porta / sala vermelha" />
            </div>
          </div>

          <div class="check-list">
            <label class="check-item">
              <input type="checkbox" required />
              <span>Confirmo chegada da equipe/veículo ao destino.</span>
            </label>
            <label class="check-item">
              <input type="checkbox" />
              <span>Houve espera por aceite ou definição de setor.</span>
            </label>
          </div>

          <div class="form-group">
            <label class="field-label" for="obs">Observação operacional mínima</label>
            <textarea class="form-textarea" id="obs" placeholder="Ex.: aguardando leito, aguardando médico, paciente direcionado para sala..."></textarea>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">Registrar microevento</button>
            <a class="secondary-button" href="../index.html">Voltar ao painel</a>
          </div>

          <div class="success-box"></div>
        </form>
      </section>

    </div>
  </main>
  <script src="../js/forms.js"></script>
</body>
</html>
