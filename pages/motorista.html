<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>MOOV | Microformulário Motorista</title><link rel="stylesheet" href="../css/styles.css"/></head><body class="form-body"><main class="form-shell"><header><a class="brand-mark" href="../index.html">MOOV</a><p style="color:var(--muted)">Link seguro temporário. Dados logísticos mínimos.</p><h1>Microcheck do motorista</h1></header><section class="panel form-card"><form id="form"><label>Microevento</label><select required><option value="">Selecione</option><option>Cheguei à origem</option><option>Paciente embarcado</option><option>Em deslocamento</option><option>Cheguei ao destino</option></select><label>KM atual</label><input inputmode="numeric" placeholder="Ex.: 45021" required/><label class="check-item"><input type="checkbox" required/> Confirmo que estou no veículo designado.</label><label>Observação operacional mínima</label><textarea placeholder="Ex.: trânsito intenso, espera na portaria..."></textarea><div class="form-actions"><button type="submit">Registrar microevento</button><a href="../index.html">Voltar ao painel</a></div><div class="success" id="success">Microevento registrado. No sistema real, esta confirmação atualizaria a linha do tempo do painel gestor.</div></form></section></main><script>document.getElementById("form").addEventListener("submit",function(event){event.preventDefault();document.getElementById("success").classList.add("show")});</script></body></html>
