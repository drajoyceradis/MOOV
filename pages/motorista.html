<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MOOV | Microformulário do Motorista</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="ambient-grid"></div>
  <main class="form-page">
    <div class="form-shell">
      <header class="form-header">
        <a class="brand-mark" href="../index.html">MOOV</a>
        <p class="eyebrow">Link seguro temporário</p>
        <h1>Microcheck do motorista</h1>
        <p class="muted">O motorista vê apenas dados logísticos mínimos. Sem diagnóstico, prontuário, CPF, CNS ou CID.</p>
      </header>

      <section class="panel-card form-card">
        <p class="eyebrow">Transferência</p>
        <div class="transfer-summary">
          <div class="summary-line"><span>Código</span><strong>R260506-P01-SM08-H01-001</strong></div>
          <div class="summary-line"><span>Origem</span><strong>PA São Pedro</strong></div>
          <div class="summary-line"><span>Destino</span><strong>Hospital Evangélico</strong></div>
          <div class="summary-line"><span>Veículo</span><strong>PMV-08</strong></div>
        </div>

        <form data-mock-form>
          <div class="form-grid">
            <div class="form-group">
              <label class="field-label" for="status">Microevento</label>
              <select class="form-select" id="status" required>
                <option value="">Selecione</option>
                <option>Cheguei à origem</option>
                <option>Paciente embarcado</option>
                <option>Em deslocamento</option>
                <option>Cheguei ao destino</option>
              </select>
            </div>
            <div class="form-group">
              <label class="field-label" for="km">KM atual</label>
              <input class="form-input" id="km" inputmode="numeric" placeholder="Ex.: 45021" required />
            </div>
          </div>

          <div class="check-list">
            <label class="check-item">
              <input type="checkbox" required />
              <span>Confirmo que estou no veículo designado para esta transição.</span>
            </label>
            <label class="check-item">
              <input type="checkbox" />
              <span>Houve intercorrência logística ou atraso relevante.</span>
            </label>
          </div>

          <div class="form-group">
            <label class="field-label" for="obs">Observação operacional mínima</label>
            <textarea class="form-textarea" id="obs" placeholder="Ex.: trânsito intenso, acesso bloqueado, espera na portaria..."></textarea>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">Registrar microevento</button>
            <a class="secondary-button" href="../index.html">Voltar ao painel</a>
          </div>

          <div class="success-box"></div>
        </form>
      </section>

    </div>
  </main>
  <script src="../js/forms.js"></script>
</body>
</html>
